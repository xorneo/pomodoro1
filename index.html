<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xorneo Pomodoro - Premium Focus Timer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dynamic colorful background blob layers -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <main class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">⏳</span>
        <h1>Xorneo</h1>
      </div>
      <button id="settings-btn" class="icon-btn" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <!-- Main Glass Card -->
    <section class="glass-card timer-card">
      <!-- Mode Selector -->
      <div class="mode-selector">
        <button id="mode-work" class="mode-btn active" data-mode="work">Work</button>
        <button id="mode-short" class="mode-btn" data-mode="short">Short Break</button>
        <button id="mode-long" class="mode-btn" data-mode="long">Long Break</button>
      </div>

      <!-- Radial Progress Ring and Timer Display -->
      <div class="timer-display-container">
        <svg class="progress-ring" viewBox="0 0 200 200">
          <defs>
            <!-- Gradient for the progress indicator -->
            <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--accent-start)" />
              <stop offset="100%" stop-color="var(--accent-end)" />
            </linearGradient>
            <!-- Subtle glow filter -->
            <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
              <feGaussianBlur stdDeviation="6" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <!-- Background track -->
          <circle class="progress-ring-track" cx="100" cy="100" r="88" stroke-width="6" />
          <!-- Animated foreground ring -->
          <circle class="progress-ring-circle" cx="100" cy="100" r="88" stroke-width="8" stroke="url(#progress-gradient)" filter="url(#glow)" />
        </svg>
        <div class="timer-time" id="timer-text">25:00</div>
      </div>

      <!-- Focus Task Display -->
      <div id="focus-task-container" class="focus-task-container hidden">
        <span class="focus-label">FOCUSING ON</span>
        <div id="focus-task-title" class="focus-title">No task selected</div>
      </div>

      <!-- Timer Controls -->
      <div class="controls">
        <button id="reset-btn" class="control-btn secondary-btn" aria-label="Reset">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
        </button>
        <button id="play-pause-btn" class="control-btn primary-btn" aria-label="Play">
          <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather hidden"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </button>
        <button id="skip-btn" class="control-btn secondary-btn" aria-label="Skip">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
        </button>
      </div>

      <!-- Stats / Cycles Tracker -->
      <div class="session-stats">
        <div class="stat-item">
          <span class="stat-label">Round</span>
          <span id="session-rounds" class="stat-val">1/4</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
          <span class="stat-label">Total focus</span>
          <span id="total-focus-time" class="stat-val">0 min</span>
        </div>
      </div>
    </section>

    <!-- Mini Task List Section -->
    <section class="glass-card tasks-card">
      <div class="card-header">
        <h2>Focus Tasks</h2>
        <span id="task-completion" class="badge">0/0</span>
      </div>

      <!-- Add Task Form -->
      <form id="add-task-form" class="add-task-form">
        <input type="text" id="new-task-input" placeholder="What are you working on?" required autocomplete="off">
        <button type="submit" class="submit-btn" aria-label="Add task">+</button>
      </form>

      <!-- Tasks List -->
      <div class="tasks-scroll-container">
        <ul id="tasks-list" class="tasks-list">
          <li class="empty-state">No tasks yet. Add one to start focusing!</li>
        </ul>
      </div>
    </section>
  </main>

  <!-- Settings Modal Overlay -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="glass-card modal-content">
      <div class="modal-header">
        <h2>Timer Settings</h2>
        <button id="close-settings-btn" class="close-btn" aria-label="Close settings">&times;</button>
      </div>

      <div class="modal-body">
        <!-- Duration fields -->
        <div class="setting-group">
          <h3>Durations (minutes)</h3>
          <div class="duration-inputs">
            <div class="input-field">
              <label for="input-work">Work</label>
              <input type="number" id="input-work" min="1" max="99" value="25">
            </div>
            <div class="input-field">
              <label for="input-short">Short Break</label>
              <input type="number" id="input-short" min="1" max="99" value="5">
            </div>
            <div class="input-field">
              <label for="input-long">Long Break</label>
              <input type="number" id="input-long" min="1" max="99" value="15">
            </div>
          </div>
        </div>

        <!-- Target cycles -->
        <div class="setting-group row-group">
          <div class="input-field">
            <label for="input-target-rounds">Rounds before Long Break</label>
            <input type="number" id="input-target-rounds" min="1" max="12" value="4">
          </div>
        </div>

        <!-- Volume Setting -->
        <div class="setting-group">
          <div class="slider-field">
            <div class="slider-label">
              <span>Alert Volume</span>
              <span id="volume-val">80%</span>
            </div>
            <input type="range" id="input-volume" min="0" max="100" value="80">
          </div>
        </div>

        <!-- Audio Test -->
        <div class="setting-group row-group">
          <button id="test-sound-btn" class="settings-action-btn">🔊 Test Alert Sound</button>
        </div>
      </div>

      <div class="modal-footer">
        <button id="reset-settings-btn" class="settings-action-btn secondary-btn">Reset Defaults</button>
        <button id="save-settings-btn" class="settings-action-btn primary-btn">Apply Settings</button>
      </div>
    </div>
  </div>

  <!-- Main Application Logic Script -->
  <script src="app.js"></script>
</body>
</html>
